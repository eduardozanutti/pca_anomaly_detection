dataset:
  name: tennessee_eastman_rieth_2017
  source: "Rieth, Amsel, Tran & Cook (2017) - Harvard Dataverse, doi:10.7910/DVN/6C3JR1"
  reference: "Downs & Vogel (1993) - A plant-wide industrial process control problem"
  notes:
    - "xmeas_1..22 = Table 4 (continuous process measurements)."
    - "xmeas_23..41 = Table 5 (sampled/analyzer measurements: reactor feed, purge gas, product)."
    - "xmv_1..11 = Table 3 (manipulated variables 1-11). XMV(12) Agitator speed is fixed/not simulated in this dataset, so it has no xmv_12 column."

column_name_map:
  # Table 4 - Continuous process measurements (XMEAS 1-22)
  xmeas_1: a_feed_stream1_kscmh
  xmeas_2: d_feed_stream2_kg_h
  xmeas_3: e_feed_stream3_kg_h
  xmeas_4: a_and_c_feed_stream4_kscmh
  xmeas_5: recycle_flow_stream8_kscmh
  xmeas_6: reactor_feed_rate_stream6_kscmh
  xmeas_7: reactor_pressure_kpa_gauge
  xmeas_8: reactor_level_pct
  xmeas_9: reactor_temperature_degc
  xmeas_10: purge_rate_stream9_kscmh
  xmeas_11: product_separator_temperature_degc
  xmeas_12: product_separator_level_pct
  xmeas_13: product_separator_pressure_kpa_gauge
  xmeas_14: product_separator_underflow_stream10_m3_h
  xmeas_15: stripper_level_pct
  xmeas_16: stripper_pressure_kpa_gauge
  xmeas_17: stripper_underflow_stream11_m3_h
  xmeas_18: stripper_temperature_degc
  xmeas_19: stripper_steam_flow_kg_h
  xmeas_20: compressor_work_kw
  xmeas_21: reactor_cooling_water_outlet_temperature_degc
  xmeas_22: separator_cooling_water_outlet_temperature_degc

  # Table 5 - Reactor feed analysis (stream 6), sampling 0.1h, dead time 0.1h
  xmeas_23: reactor_feed_a_molpct
  xmeas_24: reactor_feed_b_molpct
  xmeas_25: reactor_feed_c_molpct
  xmeas_26: reactor_feed_d_molpct
  xmeas_27: reactor_feed_e_molpct
  xmeas_28: reactor_feed_f_molpct

  # Table 5 - Purge gas analysis (stream 9), sampling 0.1h, dead time 0.1h
  xmeas_29: purge_gas_a_molpct
  xmeas_30: purge_gas_b_molpct
  xmeas_31: purge_gas_c_molpct
  xmeas_32: purge_gas_d_molpct
  xmeas_33: purge_gas_e_molpct
  xmeas_34: purge_gas_f_molpct
  xmeas_35: purge_gas_g_molpct
  xmeas_36: purge_gas_h_molpct

  # Table 5 - Product analysis (stream 11), sampling 0.25h, dead time 0.25h
  xmeas_37: product_d_molpct
  xmeas_38: product_e_molpct
  xmeas_39: product_f_molpct
  xmeas_40: product_g_molpct
  xmeas_41: product_h_molpct

  # Table 3 - Manipulated variables (XMV 1-11)
  xmv_1: d_feed_flow_stream2_kg_h
  xmv_2: e_feed_flow_stream3_kg_h
  xmv_3: a_feed_flow_stream1_kscmh
  xmv_4: a_and_c_feed_flow_stream4_kscmh
  xmv_5: compressor_recycle_valve_pct
  xmv_6: purge_valve_stream9_pct
  xmv_7: separator_pot_liquid_flow_stream10_m3_h
  xmv_8: stripper_liquid_product_flow_stream11_m3_h
  xmv_9: stripper_steam_valve_pct
  xmv_10: reactor_cooling_water_flow_m3_h
  xmv_11: condenser_cooling_water_flow_m3_h

